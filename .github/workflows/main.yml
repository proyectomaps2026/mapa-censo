name: Actualizar CSV de Airtable
on:
  workflow_dispatch: 

jobs:
  descarga:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Descargar de Airtable
        run: |
          # Usamos tus secretos: AIRTABLE_CENSO (Base) y AIRTABLE_API (Token)
          curl -v "https://api.airtable.com/v0/${{ secrets.AIRTABLE_CENSO }}/tblWiTUee1VWK9OZ2?output=csv" \
          -H "Authorization: Bearer ${{ secrets.AIRTABLE_API }}" \
          -o datos_censo.csv
          
          echo "--- DATOS DESCARGADOS ---"
          head -n 2 datos_censo.csv

      - name: Forzar Guardado
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add datos_censo.csv
          # El '|| true' evita que el robot se detenga si no hay cambios
          git commit -m "Actualización sincronizada: $(date)" || true
          git push origin main
