name: Actualizar CSV de Airtable
on:
  workflow_dispatch: 

jobs:
  descarga:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Descargar de Airtable
        run: |
          # Aquí usamos los nombres exactos que tienes en tu foto de GitHub
          curl -v "https://api.airtable.com/v0/${{ secrets.AIRTABLE_CENSO }}/tblWiTUee1VWK9OZ2?output=csv" \
          -H "Authorization: Bearer ${{ secrets.AIRTABLE_API }}" \
          -o datos_censo.csv
          
          echo "Verificando si bajaron datos..."
          cat datos_censo.csv

      - name: Guardar en GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add datos_censo.csv
          git commit -m "Descarga con nombres de secretos corregidos" || exit 0
          git push
