name: Actualizar CSV de Hacienda
on:
  workflow_dispatch: 

jobs:
  descarga:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Descargar de Airtable
        run: |
          # Usamos appqzHunqskWZJNc2 (Base) y tblWiTUee1VWK9OZ2 (Tabla)
          curl -f -v "https://api.airtable.com/v0/appqzHunqskWZJNc2/tblWiTUee1VWK9OZ2?output=csv" \
          -H "Authorization: Bearer ${{ secrets.AIRTABLE_API }}" \
          -o datos_censo.csv

      - name: Guardar cambios
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add datos_censo.csv
          git commit -m "Sincronización Hacienda: $(date +'%d-%m-%Y %H:%M')" || exit 0
          git push origin main
