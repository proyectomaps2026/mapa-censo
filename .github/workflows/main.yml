name: Actualizar CSV de Hacienda
on:
  workflow_dispatch: 

jobs:
  descarga:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Descarga Directa CSV
        run: |
          # Reemplaza la URL de abajo por el link de "Share View CSV" que copiaste
          curl -L "https://airtable.com/appqzHunqskWZJNc2/shrq94WGojXDV5QcH/tblQ4mQxkyr4FiRCG/viwEuflXQ6tL2nCDx" -o datos_censo.csv
          
          # Marca de tiempo para forzar la actualización
          echo "# Ultima sincronizacion: $(date +'%d-%m-%Y %H:%M:%S')" >> datos_censo.csv

      - name: Guardar en GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add datos_censo.csv
          git commit -m "Sincronizacion Final: $(date +'%d-%m-%Y %H:%M')" || exit 0
          git push origin main
