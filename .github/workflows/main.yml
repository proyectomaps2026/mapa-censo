name: Actualizar CSV de Airtable
on:
  schedule:
    # Ajustado a horario de oficina Venezuela (8:30 AM, 1:30 PM, 4:30 PM)
    - cron: '30 12,17,20 * * *' 
  workflow_dispatch: # Botón para actualizar a mano

jobs:
  descarga:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Descargar datos de Airtable
        run: |
          curl -v "https://api.airtable.com/v0/${{ secrets.AIRTABLE_BASE_ID }}/control%20de%20duplicados?output=csv" \
          -H "Authorization: Bearer ${{ secrets.AIRTABLE_TOKEN }}" \
          -o datos_censo.csv

      - name: Guardar cambios en GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add datos_censo.csv
          git commit -m "Actualización automática de censo" || exit 0
          git push
