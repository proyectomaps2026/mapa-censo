name: Actualizar CSV de Hacienda
on:
  workflow_dispatch: 

jobs:
  descarga:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Descargar y Convertir Datos
        env:
          AIRTABLE_API: ${{ secrets.AIRTABLE_API }}
        run: |
          pip install requests
          python - <<EOF
          import os, requests, csv
          
          # Configuracion
          token = os.environ.get("AIRTABLE_API")
          base_id = "appqzHunqskWZJNc2"
          table_id = "tblWiTUee1VWK9OZ2"
          
          url = f"https://api.airtable.com/v0/{base_id}/{table_id}"
          headers = {"Authorization": f"Bearer {token}"}
          
          print("Conectando con Airtable...")
          res = requests.get(url, headers=headers)
          data = res.json()
          
          if "records" in data:
              # Extraer solo los campos de Hacienda
              filas = [r["fields"] for r in data["records"]]
              if filas:
                  # Obtener nombres de columnas
                  columnas = filas[0].keys()
                  with open("datos_censo.csv", "w", newline="", encoding="utf-8") as f:
                      writer = csv.DictWriter(f, fieldnames=columnas)
                      writer.writeheader()
                      writer.writerows(filas)
                  print("¡Archivo datos_censo.csv creado con exito!")
              else:
                  print("La tabla esta vacia.")
          else:
              print("Error de Airtable:", data)
          EOF

      - name: Guardar en GitHub
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add datos_censo.csv
          git commit -m "Sincronizacion Hacienda $(date +'%d-%m-%Y %H:%M')" || exit 0
          git push
