name: Actualizar CSV de Airtable
on:
  workflow_dispatch: 

jobs:
  descarga:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Descargar de Airtable
        run: |
          curl -v "https://api.airtable.com/v0/appqzHunqskWZJNc2/tblWiTUee1VWK9OZ2?output=csv" \
          -H "Authorization: Bearer ${{ secrets.AIRTABLE_TOKEN }}" \
          -o datos_censo.csv
          
          # Esto imprimirá los datos en la pantalla de GitHub para confirmar
          cat datos_censo.csv

      - name: Guardar cambios
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add datos_censo.csv
          git commit -m "Descarga desde tabla real" || exit 0
          git push
