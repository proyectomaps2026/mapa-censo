name: Actualizar CSV de Hacienda
on:
  workflow_dispatch: 

jobs:
  descarga:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Descargar y Convertir Datos
        env:
          AIRTABLE_API: ${{ secrets.AIRTABLE_API }}
        run: |
          pip install requests
          python - <<EOF
          import os, requests, csv
          
          token = os.environ.get("AIRTABLE_API")
          base_id = "appqzHunqskWZJNc2"
          table_id = "tblWiTUee1VWK9OZ2"
          
          url = f"https://api.airtable.com/v0/{base_id}/{table_id}"
          headers = {"Authorization": f"Bearer {token}"}
          
          res = requests.get(url, headers=headers)
          data = res.json()
          
          if "records" in data:
              filas_limpias = []
              for r in data["records"]:
                  f = r["fields"]
                  
                  # 1. ARREGLO DE FOTOS (Para que My Maps las abra)
                  # Buscamos el link de la fachada y lo ponemos en una columna llamada "Foto"
                  link_foto = ""
                  if "Foto Fachada" in f and isinstance(f["Foto Fachada"], list):
                      link_foto = f["Foto Fachada"][0].get("url", "")
                  elif "Foto Fachada" in f:
                      link_foto = f["Foto Fachada"]
                  
                  # 2. ARREGLO DE FISCAL (Limpiar los ['rec...'])
                  fiscal = f.get("Fiscal Responsable", "")
                  if isinstance(fiscal, list):
                      fiscal = fiscal[0] # Tomamos solo el primer nombre si es una lista
                  
                  # 3. CREAMOS LA FILA CON EL ORDEN QUE QUEREMOS
                  nueva_fila = {
                      "Razón Social": f.get("Razón Social", "Sin Nombre"),
                      "Foto": link_foto,
                      "Estatus Licencia": f.get("Estatus Licencia", ""),
                      "Licencia": f.get("Licencia Act. Econ.", ""),
                      "Fiscal": fiscal,
                      "Vence": f.get("Fecha Vencimiento", ""),
                      "Cita": f.get("Próxima Cita", ""),
                      "Dirección": f.get("Dirección", ""),
                      "Coordenadas": f.get("Coordenadas", "")
                  }
                  filas_limpias.append(nueva_fila)

              if filas_limpias:
                  columnas = list(filas_limpias[0].keys())
                  with open("datos_censo.csv", "w", newline="", encoding="utf-8") as f_out:
                      writer = csv.DictWriter(f_out, fieldnames=columnas)
                      writer.writeheader()
                      writer.writerows(filas_limpias)
                  print("¡CSV Limpio y Ordenado creado con éxito!")
          EOF

      - name: Guardar en GitHub
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add datos_censo.csv
          git commit -m "Sincronización Hacienda - Limpieza de Fotos y Fiscales" || exit 0
          git push
