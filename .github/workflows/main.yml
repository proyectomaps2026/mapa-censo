name: Actualizar CSV de Hacienda
on:
  workflow_dispatch: 

jobs:
  descarga:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Descargar CSV de Hacienda
        run: |
          # Descarga directa usando la API oficial
          curl -v -L "https://api.airtable.com/v0/appqzHunqskWZJNc2/tblWiTUee1VWK9OZ2?output=csv" \
          -H "Authorization: Bearer ${{ secrets.AIRTABLE_API }}" \
          -o datos_censo.csv
          
          # Marca para que GitHub siempre vea el cambio
          echo "# Update: $(date +'%Y-%m-%d %H:%M:%S')" >> datos_censo.csv

      - name: Guardar en GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add datos_censo.csv
          git commit -m "Sincronizacion Realizada: $(date +'%d-%m-%Y %H:%M')" || exit 0
          git push origin main
