name: Actualizar CSV de Airtable
on:
  workflow_dispatch: 

jobs:
  descarga:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Descargar de Airtable
        run: |
          # Usamos el ID de la base y tabla que sacamos de tus fotos
          # Forzamos a que si falla, el proceso se detenga (fail)
          curl -f -v "https://api.airtable.com/v0/appqzHunqskWZJNc2/tblWiTUee1VWK9OZ2?output=csv" \
          -H "Authorization: Bearer ${{ secrets.AIRTABLE_TOKEN }}" \
          -o datos_censo.csv || echo "ERROR_DE_CONEXION"

      - name: Verificar Contenido
        run: |
          echo "Lo que el robot ve en el archivo:"
          cat datos_censo.csv

      - name: Guardar en GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add datos_censo.csv
          git commit -m "Actualización forzada con llaves nuevas" || exit 0
          git push
