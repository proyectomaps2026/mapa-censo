name: Actualizar CSV de Hacienda
on:
  workflow_dispatch: 
  schedule:
    # 7AM, 9AM, 11AM, 1PM, 3PM, 5PM (Vzla)
    - cron: '0 11-21/2 * * 1-5'

jobs:
  descarga:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Descargar y Convertir Datos
        env:
          AIRTABLE_API: ${{ secrets.AIRTABLE_API }}
        run: |
          pip install requests
          python - <<EOF
          import os, requests, csv
          
          token = os.environ.get("AIRTABLE_API")
          base_id = "appqzHunqskWZJNc2"
          table_id = "tblWiTUee1VWK9OZ2"
          
          url = f"https://api.airtable.com/v0/{base_id}/{table_id}"
          headers = {"Authorization": f"Bearer {token}"}
          
          res = requests.get(url, headers=headers)
          data = res.json()
          
          if "records" in data:
              filas = [r["fields"] for r in data["records"]]
              if filas:
                  columnas = set()
                  for f in filas: columnas.update(f.keys())
                  with open("datos_censo.csv", "w", newline="", encoding="utf-8") as f:
                      writer = csv.DictWriter(f, fieldnames=list(columnas))
                      writer.writeheader()
                      writer.writerows(filas)
                  print("CSV Actualizado")
          else:
              print("Error:", data)
          EOF

      - name: Guardar en GitHub
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add datos_censo.csv
          git commit -m "Sincronizacion automatica" || exit 0
          git push
