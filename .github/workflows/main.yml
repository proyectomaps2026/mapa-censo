name: Actualizar CSV de Hacienda
on:
  workflow_dispatch: 

jobs:
  descarga:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Requests
        run: pip install requests

      - name: Ejecutar Script
        env:
          AIRTABLE_API: ${{ secrets.AIRTABLE_API }}
        run: python descargar_hacienda.py

      - name: Guardar Cambios
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add datos_censo.csv
          git commit -m "Sincronización Hacienda" || exit 0
          git push
